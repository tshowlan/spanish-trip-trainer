<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#fcfcf3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Tripfluent</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preload" href="./fonts/plus-jakarta-sans.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./fonts.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="splash"></div>
  <div class="topbar">
    <div class="stat streak"><span class="ic flame"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2c1 4-3 5.5-3 9a5 5 0 0 0 10 0c0-1.5-.5-2.7-1.3-3.8C17 9.5 15 10 15 8c0-2.2-1.4-4.6-3-6z"/></svg></span><span id="stat-streak">0</span></div>
    <div class="topbar-brand" id="topbar-brand"></div>
    <button class="lang-flag-top" id="lang-flag" aria-label="Switch destination"></button>
  </div>

  <main id="app"></main>
  <nav id="tabbar"></nav>
  <div class="toast" id="toast"></div>

  <!-- content packs (plain data) -->
  <script src="./config.js"></script>
  <script src="./curriculum.js"></script>
  <script src="./content_mx.js"></script>
  <script src="./messages.js"></script>
  <!-- engine -->
  <script src="./state.js"></script>
  <script src="./engine.js"></script>
  <script src="./audio.js"></script>
  <script src="./ui.js"></script>
  <script src="./srs.js"></script>
  <script src="./weights.js"></script>
  <script src="./scoring.js"></script>
  <script src="./tiers.js"></script>
  <!-- screens -->
  <script src="./screen-onboarding.js"></script>
  <script src="./charts.js"></script>
  <script src="./screen-home.js"></script>
  <script src="./screen-learn.js"></script>
  <script src="./screen-quests.js"></script>
  <script src="./screen-phrasebook.js"></script>
  <script src="./screen-progress.js"></script>
  <script src="./screen-settings.js"></script>
  <script src="./lesson.js"></script>
  <script src="./cloud.js"></script>
  <script src="./accounts.js"></script>
  <script src="./push.js"></script>
  <script src="./trips.js"></script>
  <script src="./nav.js"></script>
  <!-- entry point (boots + routes) -->
  <script src="./app.js"></script>
</body>
</html>
