<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tripfluent</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preload" href="./fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./fonts.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="stat streak"><span class="ic">🔥</span><span id="stat-streak">0</span></div>
    <div class="stat gems"><span class="ic">💎</span><span id="stat-gems">0</span></div>
    <div class="spacer"></div>
    <div class="stat xp"><span class="ic">⚡</span><span id="stat-xp">0</span> XP</div>
    <button class="gear" id="group" aria-label="Group">👥</button>
    <button class="gear" id="gear" aria-label="Settings">⚙️</button>
  </div>

  <main id="app"></main>
  <div class="toast" id="toast"></div>

  <!-- content packs (plain data) -->
  <script src="./config.js"></script>
  <script src="./curriculum.js"></script>
  <script src="./content_mx.js"></script>
  <script src="./messages.js"></script>
  <!-- engine -->
  <script src="./state.js"></script>
  <script src="./engine.js"></script>
  <script src="./audio.js"></script>
  <script src="./ui.js"></script>
  <script src="./srs.js"></script>
  <!-- screens -->
  <script src="./screen-onboarding.js"></script>
  <script src="./screen-home.js"></script>
  <script src="./screen-settings.js"></script>
  <script src="./lesson.js"></script>
  <script src="./cloud.js"></script>
  <script src="./accounts.js"></script>
  <script src="./push.js"></script>
  <script src="./trips.js"></script>
  <!-- entry point (boots + routes) -->
  <script src="./app.js"></script>
</body>
</html>
